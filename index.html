<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Sweetheart ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="cute-face">🥺</div>

    <h1 class="typing">Sorry Sweetheart ❤️</h1>

    <p class="subtitle">
        I never wanted to hurt you...
    </p>

    <div id="heart" class="heart">
        ❤️
    </div>

    <p class="click-text">
        Tap My Heart ❤️
    </p>

    <div id="finalMessage" class="hidden">
        <h2>Will You Forgive Me? 🥺❤️</h2>
        <p>
            Because my world is prettier when you're smiling.
        </p>
    </div>

</div>

<div id="fireworks"></div>

<script>

const heart = document.getElementById("heart");
const fireworks = document.getElementById("fireworks");
const finalMessage = document.getElementById("finalMessage");

heart.addEventListener("click", () => {

    heart.classList.add("explode");

    for(let i=0;i<60;i++){

        const particle = document.createElement("div");

        particle.classList.add("particle");

        particle.innerHTML =
            ["💖","💕","💗","❤️","💞","✨"][Math.floor(Math.random()*6)];

        particle.style.left = "50%";
        particle.style.top = "50%";

        particle.style.setProperty("--x",
            `${(Math.random()-0.5)*900}px`);

        particle.style.setProperty("--y",
            `${(Math.random()-0.5)*900}px`);

        fireworks.appendChild(particle);

        setTimeout(()=>{
            particle.remove();
        },3000);
    }

    setTimeout(()=>{
        finalMessage.classList.add("show");
    },1000);

});

</script>

</body>
</html>
