<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sorry ❤️</title>

<style>
body{
    background:#0d1117;
    color:#00ff88;
    font-family:monospace;
    padding:40px;
    font-size:20px;
}
.cursor{
    animation: blink 1s infinite;
}
@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>
<body>

<div id="text"></div>

<script>
const msg = `> Initializing Apology.exe...

Loading...
██████████ 100%

ERROR DETECTED 💔
Reason: I hurt someone special.

Applying Fix...

while(you_are_upset){
    say("I'm sorry 🥺");
    care_for_you();
}

Status: Waiting for forgiveness ❤️

if(you_forgive_me){
    happiness = true;
}`;
    
let i = 0;
function type(){
    if(i < msg.length){
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type, 40);
    }else{
        document.getElementById("text").innerHTML += '<span class="cursor">|</span>';
    }
}
type();
</script>

</body>
</html>
